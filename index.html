<style>

.cal-detail{margin-top:14px;padding:14px;background:var(--lgray);border-radius:10px}
.cal-detail-row{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;font-size:12px}
.legend-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}

.dash-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}

.bar-track{flex:1;height:5px;background:var(--cream);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:14px;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeIn .3s ease}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:700;color:var(--dark);font-family:'Noto Serif KR',serif}

.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#bbb}
.form-col{display:flex;flex-direction:column;gap:12px}
.lbl{display:block;font-size:11px;font-weight:700;color:#8b4c12;margin-bottom:3px;letter-spacing:.05em}
.inp{width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:#fdf8f4;outline:none;transition:border .2s}

</style>
</head>

const KR_HOLIDAYS={'2026-01-01':'신정','2026-01-28':'설날 연휴','2026-01-29':'설날','2026-01-30':'설날 연휴','2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-15':'부처님 오신 날','2026-06-06':'현충일','2026-08-15':'광복절','2026-09-24':'추석 연휴','2026-09-25':'추석','2026-09-26':'추석 연휴','2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스'};
const LUNAR_FEST={'2026-01-29':'정월 초하루','2026-02-17':'정월 대보름','2026-05-15':'사월 초파일','2026-09-25':'추석 (음8/15)'};
function PRODS(){return['인절미','찰떡','백설기','송편','꿀떡','약식','경단','화전','수리취떡','시루떡','가래떡','떡국떡'];}
function ECATS(){return['원재료','포장재','공과금','인건비','설비','기타'];}
function METHS(){return['현금','카드','카카오페이','토스','계좌이체','입금','기타'];}
function sl(ko,ja){return LANG==='ko'?ko:ja;}
function slStatus(s){return STATUS_MAP[s]?STATUS_MAP[s][LANG]:s;}
function badge(s){const m=STATUS_MAP[s]||{[LANG]:s,color:'#888',bg:'#eee'};return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}44">${slStatus(s)}</span>`;}
function mono(t){return `<code class="mono">${t}</code>`;}
function kpiCard(icon,title,val,sub,color){return `<div class="kpi-card" style="border-top:3px solid ${color}"><div class="icon">${icon}</div><div class="val" style="color:${color}">${val}</div><div class="ttl">${title}</div><div class="sub">${sub}</div></div>`;}
function nextId(){return 'ID-'+Date.now().toString(36).toUpperCase();}
function getLunar(ds){const d=new Date(ds),ep=new Date(1900,0,31).getTime(),days=Math.floor((d.getTime()-ep)/86400000),cy=29.53059;return{m:Math.floor((days/cy)%12)+1,d:Math.floor(((days/cy)%1)*cy)+1};}
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',dur);}
function setStatus(s){const dot=document.getElementById('save-dot'),txt=document.getElementById('save-txt');if(s==='connecting'){dot.className='save-dot saving';txt.textContent=sl('연결 중...','接続中...');}else if(s==='ok'){dot.className='save-dot';dot.style.background='var(--green)';txt.textContent=sl('클라우드 연결됨','クラウド接続済');}else if(s==='saving'){dot.className='save-dot saving';txt.textContent=sl('저장 중...','保存中...');}else if(s==='saved'){dot.className='save-dot';dot.style.background='var(--green)';txt.textContent=sl('저장됨','保存済');}else{dot.className='save-dot';dot.style.background='var(--red)';txt.textContent='오류';}}
async function loadAll(){setStatus('connecting');try{const[o,c,p,e]=await Promise.all([api.get('orders','?order=created_at.desc'),api.get('customers','?order=created_at.desc'),api.get('payments','?order=created_at.desc'),api.get('expenses','?order=created_at.desc')]);DB={orders:o.map(x=>({...x,items:x.items||[]})),customers:c,payments:p,expenses:e};setStatus('ok');updateHeader();showTab(currentTab);}catch(e){setStatus('error');toast('⚠️ '+e.message,4000);}}
function updateHeader(){const rev=DB.payments.filter(p=>p.status==='완료').reduce((s,p)=>s+p.amount,0),exp=DB.expenses.reduce((s,e)=>s+e.amount,0),unp=DB.orders.filter(o=>!o.paid).length;document.getElementById('h-rev').textContent='₩'+rev.toLocaleString();document.getElementById('h-exp').textContent='₩'+exp.toLocaleString();document.getElementById('h-unp').textContent=unp+sl('건','件');}
function toggleLang(){LANG=LANG==='ko'?'ja':'ko';localStorage.setItem('tteok_lang',LANG);document.getElementById('html-root').lang=LANG;document.body.classList.toggle('ja',LANG==='ja');document.getElementById('logo-text').textContent=sl('떡방앗간 관리 시스템','トック屋管理システム');document.querySelector('.lang-btn').textContent=sl('🌐 日本語','🌐 한국어');document.querySelectorAll('.nav-l').forEach(el=>{el.textContent=el.dataset[LANG];});document.getElementById('h-rev-l').textContent=sl('이번 달 매출','今月売上');document.getElementById('h-exp-l').textContent=sl('이번 달 경비','今月経費');document.getElementById('h-unp-l').textContent=sl('미결제','未払い');updateHeader();showTab(currentTab);}
function showTab(tab){currentTab=tab;document.querySelectorAll('nav button').forEach((b,i)=>{b.classList.toggle('active',['dashboard','orders','calendar','customers','payments','expenses','settings'][i]===tab);});const el=document.getElementById('main-content');el.style.animation='none';el.offsetHeight;el.style.animation='fadeIn .35s ease';({dashboard:renderDashboard,orders:()=>renderOrders('','all'),calendar:renderCalendar,customers:()=>renderCustomers(''),payments:renderPayments,expenses:()=>renderExpenses('전체'),settings:renderSettings})[tab]?.();}
async function sendKakao(msg){if(!kakaoWebhook)return;try{await fetch(kakaoWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'🍡 떡방앗간\n'+msg})});}catch(e){}}

// ── DASHBOARD ──

  const rev=DB.payments.filter(p=>p.status==='완료').reduce((s,p)=>s+p.amount,0),exp=DB.expenses.reduce((s,e)=>s+e.amount,0),profit=rev-exp;
  const sc={};DB.orders.forEach(o=>{sc[o.status]=(sc[o.status]||0)+1;});
  const ec={};DB.expenses.forEach(e=>{ec[e.category]=(ec[e.category]||0)+e.amount;});
  const upcoming=DB.orders.filter(o=>o.status!=='done').sort((a,b)=>a.pickup.localeCompare(b.pickup)).slice(0,6);
  document.getElementById('main-content').innerHTML=`

  <div class="kpi-grid">
    ${kpiCard('💰',sl('이번 달 매출','今月売上'),'₩'+rev.toLocaleString(),DB.payments.length+sl('건 결제','件の決済'),'#c8832a')}
    ${kpiCard('🧾',sl('이번 달 경비','今月経費'),'₩'+exp.toLocaleString(),DB.expenses.length+sl('건 지출','件の支出'),'#e05555')}
    ${kpiCard('📈',sl('순이익','純利益'),'₩'+profit.toLocaleString(),profit>=0?sl('흑자 ▲','黒字 ▲'):sl('적자 ▼','赤字 ▼'),profit>=0?'#2e7d5a':'#e05555')}
    ${kpiCard('👥',sl('등록 고객 수','登録顧客数'),DB.customers.length+sl('명','名'),sl('누적 고객','累計顧客'),'#1565a8')}
  </div>
  <div class="dash-row">
    <div class="card"><div class="card-title">${sl('주문 현황','注文状況')}</div>
      ${Object.entries(STATUS_MAP).map(([k,v])=>`<div class="bar-row"><div class="dot" style="background:${v.color}"></div><div class="bar-label">${v[LANG]}</div><div class="bar-count">${sc[k]||0}${sl('건','件')}</div><div class="bar-track"><div class="bar-fill" style="width:${((sc[k]||0)/Math.max(DB.orders.length,1)*100)}%;background:${v.color}"></div></div></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">${sl('경비 카테고리별','経費カテゴリ別')}</div>
      ${Object.entries(ec).map(([c,a])=>`<div class="bar-row"><div class="bar-label">${c}</div><div class="bar-count" style="width:80px">₩${a.toLocaleString()}</div><div class="bar-track"><div class="bar-fill" style="width:${(a/Math.max(exp,1)*100)}%;background:#e05555"></div></div></div>`).join('')}
    </div>
  </div>
  <div class="card"><div class="card-head"><div class="card-title" style="margin-bottom:0">${sl('다가오는 예약 주문','直近の予約注文')}</div></div>
    <table><thead><tr><th>${sl('주문번호','注文番号')}</th><th>${sl('고객명','顧客名')}</th><th>${sl('수령일','受取日')}</th><th>${sl('금액','金額')}</th><th>${sl('상태','状態')}</th><th>${sl('결제','決済')}</th></tr></thead><tbody>
    ${upcoming.map(o=>`<tr class="trow"><td>${mono(o.id)}</td><td>${o.customer_name}</td><td>${o.pickup}</td><td>₩${o.total.toLocaleString()}</td><td>${badge(o.status)}</td><td style="color:${o.paid?'#2e7d5a':'#e05555'};font-weight:600">${o.paid?sl('✓ 완료','✓ 完了'):sl('미결제','未払い')}</td></tr>`).join('')}
    </tbody></table>
  </div>`;}

// ── ORDERS ──
function ordersHTML(s,f){
  const filtered=DB.orders.filter(o=>(f==='all'||o.status===f)&&(o.customer_name.includes(s)||o.id.includes(s))).sort((a,b)=>a.pickup.localeCompare(b.pickup));
  return `${filtered.length===0?`<div class="card" style="text-align:center;color:var(--gray);padding:32px">${sl('주문이 없습니다','注文がありません')}</div>`:''}
  ${filtered.map(o=>`
  <div class="order-card" style="border-left-color:${STATUS_MAP[o.status]?.color||'#ccc'}">
    <div class="order-top">
      <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">${mono(o.id)} ${badge(o.status)} ${!o.paid?`<span class="unpaid-badge">${sl('미결제','未払い')}</span>`:''}</div>
      <span style="font-size:11px;color:var(--gray)">🗓 ${o.pickup}</span>
    </div>
    <div class="order-name">${o.customer_name}</div>
    <div class="item-tags">${(o.items||[]).map(it=>`<span class="itag">${it.name} ×${it.qty}</span>`).join('')}</div>
    ${o.note?`<div class="order-note">📝 ${o.note}</div>`:''}
    <div class="order-bot">
      <strong style="color:var(--gold)">₩${o.total.toLocaleString()}</strong>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <select class="sel-sm" onchange="updateStatus('${o.id}',this.value)">
          ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${o.status===k?'selected':''}>${v[LANG]}</option>`).join('')}
        </select>
        ${!o.paid?`<button class="pay-btn" onclick="markPaid('${o.id}')">${sl('결제 완료','支払完了')}</button>`:''}
        <button class="print-btn" onclick="printReceipt('${o.id}')">🖨 ${sl('영수증','領収書')}</button>
        <button class="edit-btn" onclick="openViewOrder('${o.id}')">${sl('상세','詳細')}</button>
        <button class="del-btn-sm" onclick="delOrder('${o.id}')">${sl('삭제','削除')}</button>
      </div>
    </div>
  </div>`).join('')}`;
}
function refreshOrderList(){
  const s=document.getElementById('ord-s')?.value||'';
  const f=document.getElementById('ord-f')?.value||'all';
  const el=document.getElementById('order-list');
  if(el) el.innerHTML=ordersHTML(s,f);
}
function renderOrders(search,filter){
  const s=search||'',f=filter||'all';
  document.getElementById('main-content').innerHTML=`
  <div class="sec-head"><h2 class="sec-title">📋 ${sl('예약 주문 관리','予約注文管理')}</h2><button class="add-btn" onclick="openAddOrder()">+ ${sl('신규 주문','新規注文')}</button></div>
  <div class="toolbar">
    <div class="search-wrap">
      <input id="ord-s" placeholder="${sl('고객명·주문번호 검색...','顧客名・注文番号検索...')}" value="${s}" oninput="refreshOrderList()"/>
      <button class="search-clear" onclick="document.getElementById('ord-s').value='';refreshOrderList()">×</button>
    </div>
    <select class="sel" id="ord-f" onchange="refreshOrderList()">
      <option value="all" ${f==='all'?'selected':''}>${sl('전체 상태','全状態')}</option>
      ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${f===k?'selected':''}>${v[LANG]}</option>`).join('')}
    </select>
  </div>
  <div class="order-grid" id="order-list">${ordersHTML(s,f)}</div>`;}

async function updateStatus(id,status){try{setStatus('saving');await api.patch('orders',id,{status});DB.orders=DB.orders.map(o=>o.id===id?{...o,status}:o);setStatus('saved');await sendKakao(`${sl('주문 상태 변경','注文状態変更')}\n${id} → ${slStatus(status)}`);refreshOrderList();}catch(e){toast('⚠️ '+e.message);}}
async function markPaid(id){try{setStatus('saving');await api.patch('orders',id,{paid:true});DB.orders=DB.orders.map(o=>o.id===id?{...o,paid:true}:o);setStatus('saved');updateHeader();const o=DB.orders.find(x=>x.id===id);await sendKakao(`${sl('결제 완료','支払完了')}\n${o?.customer_name} / ₩${o?.total?.toLocaleString()}`);refreshOrderList();toast(sl('✓ 결제 완료','✓ 支払完了'));}catch(e){toast('⚠️ '+e.message);}}
async function delOrder(id){if(!confirm(sl('삭제하시겠습니까?','削除しますか？')))return;try{setStatus('saving');await api.del('orders',id);DB.orders=DB.orders.filter(o=>o.id!==id);setStatus('saved');updateHeader();refreshOrderList();toast(sl('삭제되었습니다','削除しました'));}catch(e){toast('⚠️ '+e.message);}}

function printReceipt(id){const o=DB.orders.find(x=>x.id===id);if(!o)return;const w=window.open('','_blank','width=400,height=600');w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:'Noto Sans KR',sans-serif;padding:20px;max-width:320px;margin:0 auto}h2{text-align:center;font-size:18px;margin-bottom:4px}.sub{text-align:center;font-size:11px;color:#888;margin-bottom:16px}hr{border:none;border-top:1px dashed #ccc;margin:12px 0}.row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}.total{font-size:16px;font-weight:700}.footer{text-align:center;font-size:10px;color:#aaa;margin-top:16px}@media print{button{display:none}}</style></head><body><h2>🍡 떡방앗간</h2><div class="sub">${sl('영수증','領収書')}</div><hr/><div class="row"><span>${sl('주문번호','注文番号')}</span><span>${o.id}</span></div><div class="row"><span>${sl('고객명','顧客名')}</span><span>${o.customer_name}</span></div><div class="row"><span>${sl('수령일','受取日')}</span><span>${o.pickup}</span></div><hr/>${(o.items||[]).map(it=>`<div class="row"><span>${it.name} ×${it.qty}</span><span>₩${(it.qty*it.price).toLocaleString()}</span></div>`).join('')}<hr/><div class="row total"><span>${sl('합계','合計')}</span><span>₩${o.total.toLocaleString()}</span></div><div class="row"><span>${sl('결제','決済')}</span><span>${o.paid?sl('완료','完了'):sl('미결제','未払い')}</span></div>${o.note?`<div class="row"><span>${sl('비고','備考')}</span><span>${o.note}</span></div>`:''}<hr/><div class="footer">${new Date().toLocaleString('ko-KR')}<br>${sl('감사합니다 🍡','ありがとうございます 🍡')}</div><br><button onclick="window.print()" style="width:100%;padding:10px;background:#2a1208;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">${sl('인쇄하기','印刷する')}</button></body></html>`);w.document.close();}

// ── CALENDAR ──
function renderCalendar(){
  const DAYS=LANG==='ko'?['일','월','화','수','목','금','토']:['日','月','火','水','木','金','土'];
  const MONTHS=LANG==='ko'?['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const byDate={};DB.orders.forEach(o=>{if(!byDate[o.pickup])byDate[o.pickup]=[];byDate[o.pickup].push(o);});
  let cells='';
  for(let i=0;i<fd;i++)cells+=`<div class="cal-empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hol=KR_HOLIDAYS[ds]||'',lunar=LUNAR_FEST[ds]||'',orders=byDate[ds]||[],isToday=ds===todayStr;
    const isSun=(fd+d-1)%7===0,isSat=(fd+d-1)%7===6,isSel=calSelected===ds;
    const lun=getLunar(ds),dc=hol?'#e05555':isSun?'#e05555':isSat?'#1565a8':'var(--dark)';
    cells+=`<div class="cal-cell" style="background:${isSel?'#fff3e0':isToday?'#e8f5e9':'#fff'};border:${isToday?'2px solid #2e7d5a':isSel?'2px solid #c8832a':'1px solid var(--border)'}" onclick="calSel('${ds}')">
      <div class="cal-date" style="color:${dc};font-weight:${isToday?700:500}">${d}${isToday?`<span style="font-size:7px;background:#2e7d5a;color:#fff;border-radius:2px;padding:0 2px;margin-left:2px">${sl('오늘','今日')}</span>`:''}</div>
      <div class="lunar-date">${sl('음','陰')} ${lun.m}/${lun.d}</div>
      ${hol?`<div class="hol-tag">${hol}</div>`:''}${lunar&&!hol?`<div class="lunar-tag">${lunar}</div>`:''}
      ${orders.slice(0,2).map(o=>`<div class="cal-dot" style="background:${STATUS_MAP[o.status]?.color||'#888'}22;color:${STATUS_MAP[o.status]?.color||'#888'}">${o.customer_name}</div>`).join('')}
      ${orders.length>2?`<div style="font-size:7px;color:var(--gray)">+${orders.length-2}${sl('건','件')}</div>`:''}
    </div>`;
  }
  const selO=calSelected?byDate[calSelected]||[]:[];
  document.getElementById('main-content').innerHTML=`
  <div class="sec-head"><h2 class="sec-title">📅 ${sl('주문 캘린더','注文カレンダー')}</h2><button class="add-btn" onclick="openAddOrder()">+ ${sl('신규 주문','新規注文')}</button></div>
  <div class="legend-row">
    <div class="legend-item"><div class="legend-dot" style="background:#e05555"></div>${sl('공휴일','祝日')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7b1fa2"></div>${sl('음력 명절','旧暦節句')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2e7d5a"></div>${sl('오늘','今日')}</div>
  </div>
  <div class="cal-wrap">
    <div class="cal-hdr">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <span class="cal-title">${calYear}${sl('년 ','年')}${MONTHS[calMonth]}</span>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map((d,i)=>`<div class="cal-dh" style="color:${i===0?'#e05555':i===6?'#1565a8':'#666'}">${d}</div>`).join('')}
      ${cells}
    </div>
    ${calSelected&&selO.length?`<div class="cal-detail"><div class="card-title">${calSelected} ${sl('주문 목록','注文一覧')}</div>${selO.map(o=>`<div class="cal-detail-row">${mono(o.id)}<span>${o.customer_name}</span><span>${(o.items||[]).map(it=>it.name+'×'+it.qty).join(', ')}</span>${badge(o.status)}<strong style="color:var(--gold)">₩${o.total.toLocaleString()}</strong><button class="print-btn" onclick="printReceipt('${o.id}')">🖨</button></div>`).join('')}</div>`:''}
  </div>`;}
function calPrev(){if(calMonth===0){calYear--;calMonth=11;}else calMonth--;calSelected=null;renderCalendar();}
function calNext(){if(calMonth===11){calYear++;calMonth=0;}else calMonth++;calSelected=null;renderCalendar();}
function calSel(ds){calSelected=calSelected===ds?null:ds;renderCalendar();}

// ── CUSTOMERS ──
function customersHTML(s){

async function submitOrder(){
  syncItems();
  const name=document.getElementById('f-name').value.trim();
  const pickup=document.getElementById('f-pickup').value;
  const note=document.getElementById('f-note').value.trim();
  const payMethod=document.getElementById('f-pay-method')?.value||'';
  const phone=document.getElementById('f-phone-hidden')?.value||'';
  if(!name||!pickup){toast(sl('고객명과 수령일을 입력해주세요','顧客名と受取日を入力してください'));return;}
  const total=tmpItems.reduce((s,i)=>s+i.qty*i.price,0);
  const newO={id:nextId(),customer_name:name,items:tmpItems,total,pickup,status:'pending',paid:false,note};
  try{
    setStatus('saving');
    const res=await api.post('orders',newO);
    const savedOrder=res[0]||newO;
    DB.orders.unshift(savedOrder);
    // 顧客が未登録なら自動登録
    const existCust=DB.customers.find(c=>c.name===name);
    if(!existCust&&name){
      const newC={id:nextId(),name,phone,email:'',address:'',note:'',total_orders:1,total_spent:total};
      try{const cr=await api.post('customers',newC);DB.customers.unshift(cr[0]||newC);}catch(e){}
    } else if(existCust){
      // 既存顧客の累計更新
      const upd={total_orders:(existCust.total_orders||0)+1,total_spent:(existCust.total_spent||0)+total};
      try{await api.patch('customers',existCust.id,upd);DB.customers=DB.customers.map(c=>c.id===existCust.id?{...c,...upd}:c);}catch(e){}
    }
    // 決済方法が選択されていたら自動で決済も登録
    if(payMethod){
      const newP={id:nextId(),order_id:savedOrder.id,amount:total,method:payMethod,date:new Date().toISOString().slice(0,10),status:'완료'};
      try{
        const pr=await api.post('payments',newP);
        DB.payments.unshift(pr[0]||newP);
        await api.patch('orders',savedOrder.id,{paid:true});
        DB.orders=DB.orders.map(o=>o.id===savedOrder.id?{...o,paid:true}:o);
      }catch(e){}
    }
    setStatus('saved');closeModal();renderOrders('','all');updateHeader();
    toast(sl('✓ 주문이 등록되었습니다','✓ 注文を登録しました'));
    await sendKakao(`${sl('신규 주문 접수','新規注文受付')}\n${sl('고객','顧客')}: ${name}\n${sl('수령일','受取日')}: ${pickup}\n${sl('합계','合計')}: ₩${total.toLocaleString()}${payMethod?'\n'+sl('결제','決済')+': '+payMethod:''}`);
  }catch(e){toast('⚠️ '+e.message);}
}

function openAddCustomer(){openModal(sl('신규 고객 등록','新規顧客登録'),`<div class="form-col"><div><label class="lbl">${sl('성명','氏名')}</label><input class="inp" id="f-cname"/></div><div><label class="lbl">${sl('전화번호','電話番号')}</label><input class="inp" id="f-phone" placeholder="010-0000-0000"/></div><div><label class="lbl">${sl('이메일','メール')}</label><input class="inp" id="f-email" type="email"/></div><div><label class="lbl">${sl('주소','住所')}</label><input class="inp" id="f-addr"/></div><div><label class="lbl">${sl('메모','メモ')}</label><input class="inp" id="f-cnote"/></div></div>`,`<button class="cancel-btn" onclick="closeModal()">${sl('취소','キャンセル')}</button><button class="submit-btn" onclick="submitCustomer()">${sl('저장하기','保存する')}</button>`);}
async function submitCustomer(){const name=document.getElementById('f-cname').value.trim();if(!name){toast(sl('성명을 입력해주세요','氏名を入力してください'));return;}const newC={id:nextId(),name,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,address:document.getElementById('f-addr').value,note:document.getElementById('f-cnote').value,total_orders:0,total_spent:0};try{setStatus('saving');const res=await api.post('customers',newC);DB.customers.unshift(res[0]||newC);setStatus('saved');closeModal();renderCustomers('');toast(sl('✓ 등록되었습니다','✓ 登録しました'));}catch(e){toast('⚠️ '+e.message);}}
function openEditCustomer(id){const c=DB.customers.find(x=>x.id===id);if(!c)return;openModal(sl('고객 정보 수정','顧客情報編集'),`<div class="form-col"><div><label class="lbl">${sl('성명','氏名')}</label><input class="inp" id="f-cname" value="${c.name}"/></div><div><label class="lbl">${sl('전화번호','電話番号')}</label><input class="inp" id="f-phone" value="${c.phone}"/></div><div><label class="lbl">${sl('이메일','メール')}</label><input class="inp" id="f-email" value="${c.email}"/></div><div><label class="lbl">${sl('주소','住所')}</label><input class="inp" id="f-addr" value="${c.address}"/></div><div><label class="lbl">${sl('메모','メモ')}</label><input class="inp" id="f-cnote" value="${c.note}"/></div></div>`,`<button class="cancel-btn" onclick="closeModal()">${sl('취소','キャンセル')}</button><button class="submit-btn" onclick="submitEditCustomer('${id}')">${sl('저장하기','保存する')}</button>`);}
async function submitEditCustomer(id){const updated={name:document.getElementById('f-cname').value,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,address:document.getElementById('f-addr').value,note:document.getElementById('f-cnote').value};try{setStatus('saving');await api.patch('customers',id,updated);DB.customers=DB.customers.map(c=>c.id===id?{...c,...updated}:c);setStatus('saved');closeModal();renderCustomers('');toast(sl('✓ 수정되었습니다','✓ 更新しました'));}catch(e){toast('⚠️ '+e.message);}}
function openAddPayment(orderId,amount){openModal(sl('결제 입력','決済入力'),`<div class="form-col"><div><label class="lbl">${sl('주문번호','注文番号')}</label><input class="inp" id="f-oid" value="${orderId||''}"/></div><div><label class="lbl">${sl('금액 (₩)','金額 (₩)')}</label><input class="inp" id="f-amt" type="number" value="${amount||''}"/></div><div><label class="lbl">${sl('결제 수단','決済手段')}</label><select class="inp sel" id="f-method">${METHS().map(m=>`<option>${m}</option>`).join('')}</select></div><div><label class="lbl">${sl('날짜','日付')}</label><input class="inp" id="f-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div></div>`,`<button class="cancel-btn" onclick="closeModal()">${sl('취소','キャンセル')}</button><button class="submit-btn" onclick="submitPayment()">${sl('저장하기','保存する')}</button>`);}
function openAddPaymentFor(id,amt){openAddPayment(id,amt);}
async function delPayment(id){if(!confirm(sl('삭제하시겠습니까?','削除しますか？')))return;try{setStatus('saving');await api.del('payments',id);DB.payments=DB.payments.filter(p=>p.id!==id);setStatus('saved');renderPayments();updateHeader();toast(sl('삭제되었습니다','削除しました'));}catch(e){toast('⚠️ '+e.message);}}
async function submitPayment(){const oid=document.getElementById('f-oid').value.trim(),amt=Number(document.getElementById('f-amt').value);if(!oid||!amt){toast(sl('주문번호와 금액을 입력해주세요','注文番号と金額を入力してください'));return;}const newP={id:nextId(),order_id:oid,amount:amt,method:document.getElementById('f-method').value,date:document.getElementById('f-date').value,status:'완료'};try{setStatus('saving');const res=await api.post('payments',newP);DB.payments.unshift(res[0]||newP);await api.patch('orders',oid,{paid:true});DB.orders=DB.orders.map(o=>o.id===oid?{...o,paid:true}:o);setStatus('saved');closeModal();renderPayments();updateHeader();toast(sl('✓ 결제가 등록되었습니다','✓ 決済を登録しました'));await sendKakao(`${sl('결제 완료','支払完了')}\n${sl('주문','注文')}: ${oid}\n${sl('금액','金額')}: ₩${amt.toLocaleString()}`);}catch(e){toast('⚠️ '+e.message);}}
function openAddExpense(){openModal(sl('경비 추가','経費追加'),`<div class="form-col"><div><label class="lbl">${sl('카테고리','カテゴリ')}</label><select class="inp sel" id="f-cat">${ECATS().map(c=>`<option>${c}</option>`).join('')}</select></div><div><label class="lbl">${sl('품목명','品目名')}</label><input class="inp" id="f-item"/></div><div><label class="lbl">${sl('금액 (₩)','金額 (₩)')}</label><input class="inp" id="f-eamt" type="number"/></div><div><label class="lbl">${sl('납품업체','仕入先')}</label><input class="inp" id="f-vendor"/></div><div><label class="lbl">${sl('날짜','日付')}</label><input class="inp" id="f-edate" type="date" value="${new Date().toISOString().slice(0,10)}"/></div></div>`,`<button class="cancel-btn" onclick="closeModal()">${sl('취소','キャンセル')}</button><button class="submit-btn" onclick="submitExpense()">${sl('저장하기','保存する')}</button>`);}
async function submitExpense(){const item=document.getElementById('f-item').value.trim(),amt=Number(document.getElementById('f-eamt').value);if(!item||!amt){toast(sl('품목명과 금액을 입력해주세요','品目名と金額を入力してください'));return;}const newE={id:nextId(),category:document.getElementById('f-cat').value,item,amount:amt,vendor:document.getElementById('f-vendor').value,date:document.getElementById('f-edate').value};try{setStatus('saving');const res=await api.post('expenses',newE);DB.expenses.unshift(res[0]||newE);setStatus('saved');closeModal();renderExpenses('전체');updateHeader();toast(sl('✓ 경비가 등록되었습니다','✓ 経費を登録しました'));}catch(e){toast('⚠️ '+e.message);}}

loadAll();
