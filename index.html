<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>떡방앗간 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#fdf6ed;color:#2a1208;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f5ede2}
::-webkit-scrollbar-thumb{background:#c8a882;border-radius:3px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;transition:all .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
/* HEADER */
header{background:linear-gradient(135deg,#2a1208 0%,#6b2f0a 60%,#8b4c12 100%);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 50%,rgba(200,131,42,.18),transparent 60%);pointer-events:none}
.logo{display:flex;align-items:center;gap:14px;position:relative}
.logo-icon{font-size:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.logo-ko{font-size:20px;font-weight:700;font-family:'Noto Serif KR',serif;letter-spacing:.04em}
.logo-en{font-size:10px;letter-spacing:.25em;opacity:.5}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;position:relative}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi-chip{background:rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;text-align:center}
.kpi-chip .val{font-size:15px;font-weight:700}
.kpi-chip .lbl{font-size:10px;opacity:.6}
.save-status{font-size:11px;opacity:.8}
/* NAV */
nav{background:#fff;border-bottom:2px solid #f0ddc8;display:flex;overflow-x:auto;padding:0 16px}
nav button{padding:14px 16px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;color:#7a4a20;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
nav button:hover{background:#f5ede2}
nav button.active{color:#8b2500;border-bottom:3px solid #c8832a;background:#fff8ef}
/* MAIN */
main{max-width:1280px;margin:0 auto;padding:28px 16px;animation:fadeIn .4s ease}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
h2{font-size:22px;font-weight:700;color:#2a1208;font-family:'Noto Serif KR',serif}
.add-btn{padding:10px 20px;background:linear-gradient(135deg,#8b2500,#c8832a);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(200,131,42,.4);transition:all .2s}
.add-btn:hover{opacity:.88;transform:scale(.98)}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);border-top:3px solid}
.kpi-card .icon{font-size:28px;margin-bottom:8px}
.kpi-card .val{font-size:22px;font-weight:700}
.kpi-card .title{font-size:13px;color:#888;margin-top:4px}
.kpi-card .sub{font-size:11px;color:#bbb;margin-top:2px}
/* TOOLBAR */
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;padding:10px 14px;border:1px solid #e8d4b8;border-radius:10px;font-size:14px;background:#fff;outline:none}
select.sel{padding:10px 14px;border:1px solid #e8d4b8;border-radius:10px;font-size:14px;background:#fff}
select.sel-sm{padding:6px 10px;border:1px solid #e8d4b8;border-radius:8px;font-size:13px;background:#fff}
/* TABLE */
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:12px;color:#888;font-weight:600;border-bottom:2px solid #f0ddc8;background:#fdf6ed}
tr{border-bottom:1px solid #f5ede2}
td{padding:10px 12px;font-size:13px;vertical-align:middle}
/* BADGES */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.mono{background:#f5ede2;padding:2px 6px;border-radius:4px;font-size:11px;font-family:monospace;color:#8b4c12}
/* ORDER CARDS */
.order-grid{display:flex;flex-direction:column;gap:12px}
.order-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.07);border-left:4px solid;transition:all .2s}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.order-name{font-size:17px;font-weight:700;color:#2a1208;margin-bottom:8px;font-family:'Noto Serif KR',serif}
.item-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.itag{background:#fff3e0;color:#8b4c12;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.order-note{font-size:12px;color:#aaa;background:#fdf6ed;padding:4px 8px;border-radius:6px;margin-bottom:8px}
.order-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.unpaid-badge{background:#ffeaea;color:#e05555;border:1px solid rgba(224,85,85,.33);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pay-btn{padding:6px 12px;background:#2e7d5a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;transition:all .2s}
.pay-btn:hover{opacity:.88}
.edit-btn{padding:6px 12px;background:#f5ede2;color:#6b2f0a;border:1px solid #e8d4b8;border-radius:8px;font-size:12px;font-weight:600;transition:all .2s}
.del-btn-sm{padding:6px 12px;background:#fff0f0;color:#e05555;border:1px solid #e8d4b8;border-radius:8px;font-size:12px;font-weight:600}
/* CALENDAR */
.cal-wrap{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-title{font-size:20px;font-weight:700;font-family:'Noto Serif KR',serif;color:#2a1208}
.cal-nav{background:none;border:1px solid #e8d4b8;border-radius:8px;padding:6px 14px;font-size:18px;cursor:pointer;color:#6b2f0a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-head{text-align:center;font-size:13px;font-weight:700;padding:8px 0;background:#fdf6ed;border-radius:6px}
.cal-cell-empty{min-height:90px;background:#fdf6ed;border-radius:8px;opacity:.3}
.cal-cell{min-height:90px;border-radius:8px;padding:5px;overflow:hidden;cursor:pointer;transition:all .15s;border:1px solid #f0e0cc}
.cal-cell:hover{border-color:#c8832a}
.cal-date{font-size:13px;font-weight:500;margin-bottom:1px}
.lunar-date{font-size:9px;color:#bbb;margin-bottom:2px}
.holiday-tag{font-size:8px;background:#ffeaea;color:#e05555;border-radius:3px;padding:1px 3px;margin-bottom:2px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lunar-tag{font-size:8px;background:#f3e5f5;color:#7b1fa2;border-radius:3px;padding:1px 3px;margin-bottom:2px;font-weight:600}
.cal-order-dot{font-size:8px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.cal-detail{margin-top:16px;padding:16px;background:#fdf6ed;border-radius:10px}
.cal-detail-row{display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #f0ddc8;flex-wrap:wrap;font-size:13px}
/* CUSTOMERS */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.cust-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.07);display:flex;gap:14px;transition:all .2s}
.cust-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#c8832a,#8b2500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;font-family:'Noto Serif KR',serif}
.cust-name{font-size:16px;font-weight:700;color:#2a1208;margin-bottom:4px;font-family:'Noto Serif KR',serif}
.cust-detail{font-size:12px;color:#777;margin-bottom:2px}
.cust-note{font-size:11px;color:#c8832a;background:#fff8ef;padding:2px 8px;border-radius:4px;margin-top:4px;display:inline-block}
.cust-stats{display:flex;gap:14px;margin-top:8px;font-size:12px;color:#aaa}
/* EXPENSES */
.exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.exp-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);position:relative;transition:all .2s}
.exp-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.exp-cat{font-size:10px;color:#c8832a;font-weight:700;text-transform:uppercase;letter-spacing:.12em;background:#fff8ef;display:inline-block;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.exp-item{font-size:15px;font-weight:700;color:#2a1208;margin-bottom:4px;font-family:'Noto Serif KR',serif}
.exp-amt{font-size:20px;font-weight:700;color:#e05555}
.del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:#ddd;cursor:pointer;font-size:14px}
.del-btn:hover{color:#e05555}
/* UNPAID */
.unpaid-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5ede2;flex-wrap:wrap;gap:8px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:fadeIn .3s ease}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:18px;font-weight:700;color:#2a1208;font-family:'Noto Serif KR',serif}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#bbb}
.form-col{display:flex;flex-direction:column;gap:14px}
.lbl{display:block;font-size:12px;font-weight:700;color:#8b4c12;margin-bottom:4px;letter-spacing:.05em}
.inp{width:100%;padding:10px 14px;border:1px solid #e8d4b8;border-radius:10px;font-size:14px;background:#fdf8f4;outline:none}
.inp:focus{border-color:#c8832a}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.cancel-btn{padding:10px 22px;background:#f5ede2;color:#888;border:none;border-radius:10px;font-size:14px;font-weight:600}
.submit-btn{padding:10px 22px;background:linear-gradient(135deg,#8b2500,#c8832a);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700}
/* DASH */
.dash-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bar-label{font-size:12px;color:#666;width:68px;flex-shrink:0}
.bar-count{font-size:12px;font-weight:700;width:60px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#f0e4d0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.link-btn{background:none;border:none;color:#c8832a;cursor:pointer;font-size:13px;font-weight:600}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:16px;font-weight:700;color:#2a1208;margin-bottom:14px;font-family:'Noto Serif KR',serif}
.legend-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#666}
.legend-dot{width:12px;height:12px;border-radius:3px}
@media(max-width:600px){
  header{padding:14px 16px}
  .logo-ko{font-size:16px}
  nav button{padding:12px 12px;font-size:13px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .cal-grid{gap:2px}
  .cal-cell{min-height:70px;padding:3px}
  .cal-date{font-size:11px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍡</div>
    <div>
      <div class="logo-ko">떡방앗간 관리 시스템</div>
      <div class="logo-en">TTEOK SHOP MANAGER</div>
    </div>
  </div>
  <div class="header-right">
    <div class="kpi-row">
      <div class="kpi-chip"><div class="val" id="hdr-revenue" style="color:#f5c842">₩0</div><div class="lbl">이번 달 매출</div></div>
      <div class="kpi-chip"><div class="val" id="hdr-expense" style="color:#e05555">₩0</div><div class="lbl">이번 달 경비</div></div>
      <div class="kpi-chip"><div class="val" id="hdr-unpaid" style="color:#9c6fe4">0건</div><div class="lbl">미결제</div></div>
    </div>
    <div class="save-status" id="save-status" style="color:#6fcf97">✓ 자동 저장됨</div>
  </div>
</header>

<nav id="nav">
  <button class="active" onclick="showTab('dashboard')">📊 대시보드</button>
  <button onclick="showTab('orders')">📋 예약 주문</button>
  <button onclick="showTab('calendar')">📅 주문 캘린더</button>
  <button onclick="showTab('customers')">👥 고객 관리</button>
  <button onclick="showTab('payments')">💳 결제 관리</button>
  <button onclick="showTab('expenses')">🧾 경비 관리</button>
</nav>

<main id="main-content"></main>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title" id="modal-title"></span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ==================== 데이터 ====================
const STORAGE_KEY = 'tteok_shop_v3';
const PRODUCTS = ['인절미','찰떡','백설기','송편','꿀떡','약식','경단','화전','수리취떡','시루떡','가래떡','떡국떡'];
const EXPENSE_CATS = ['원재료','포장재','공과금','인건비','설비','기타'];
const METHODS = ['현금','카드','카카오페이','토스','계좌이체','기타'];
const STATUS_MAP = {
  pending:   {label:'접수중',  color:'#c8832a',bg:'#fff3e0'},
  confirmed: {label:'확인완료',color:'#2e7d5a',bg:'#e8f5e9'},
  preparing: {label:'제조중',  color:'#1565a8',bg:'#e3f2fd'},
  ready:     {label:'수령가능',color:'#7b1fa2',bg:'#f3e5f5'},
  done:      {label:'완료',    color:'#666',   bg:'#f5f5f5'},
};
const KR_HOLIDAYS = {
  '2026-01-01':'신정','2026-01-28':'설날 연휴','2026-01-29':'설날','2026-01-30':'설날 연휴',
  '2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-15':'부처님 오신 날',
  '2026-06-06':'현충일','2026-08-15':'광복절','2026-09-24':'추석 연휴',
  '2026-09-25':'추석','2026-09-26':'추석 연휴','2026-10-03':'개천절',
  '2026-10-09':'한글날','2026-12-25':'크리스마스',
  '2027-01-01':'신정','2027-01-17':'설날 연휴','2027-01-18':'설날','2027-01-19':'설날 연휴',
  '2027-03-01':'삼일절','2027-05-05':'어린이날','2027-06-06':'현충일',
  '2027-08-15':'광복절','2027-10-03':'개천절','2027-10-09':'한글날','2027-12-25':'크리스마스',
};
const LUNAR_FEST = {
  '2026-01-29':'정월 초하루','2026-02-17':'정월 대보름','2026-05-15':'사월 초파일',
  '2026-09-25':'추석 (음8/15)','2026-12-22':'동지',
};
const INITIAL = {
  orders:[
    {id:'ORD-001',customerName:'김지은',items:[{name:'인절미',qty:20,price:2500}],total:50000,pickup:'2026-05-15',status:'confirmed',paid:true,note:'설 선물용 포장 요청'},
    {id:'ORD-002',customerName:'이민준',items:[{name:'찰떡',qty:10,price:3000},{name:'백설기',qty:5,price:2000}],total:40000,pickup:'2026-05-20',status:'preparing',paid:false,note:''},
    {id:'ORD-003',customerName:'박서연',items:[{name:'송편',qty:30,price:2200}],total:66000,pickup:'2026-09-25',status:'pending',paid:false,note:'추석 선물 세트'},
  ],
  customers:[
    {id:'C001',name:'김지은',phone:'010-1234-5678',email:'jieun@example.com',address:'서울시 종로구 인사동 1-2',totalOrders:6,totalSpent:320000,note:'단골 VIP 고객'},
    {id:'C002',name:'이민준',phone:'010-9876-5432',email:'minjun@example.com',address:'서울시 마포구 홍대입구 3-4',totalOrders:2,totalSpent:85000,note:''},
    {id:'C003',name:'박서연',phone:'010-2222-3333',email:'seoyeon@example.com',address:'서울시 강남구 압구정로 7-8',totalOrders:9,totalSpent:520000,note:'명절 대량 주문 단골'},
  ],
  payments:[
    {id:'PAY-001',orderId:'ORD-001',amount:50000,method:'현금',date:'2026-05-10',status:'완료'},
  ],
  expenses:[
    {id:'EXP-001',category:'원재료',item:'찹쌀 (20kg)',amount:52000,date:'2026-05-08',vendor:'○○농협'},
    {id:'EXP-002',category:'포장재',item:'선물 상자·리본',amount:18000,date:'2026-05-07',vendor:'△△포장재'},
    {id:'EXP-003',category:'공과금',item:'전기요금',amount:85000,date:'2026-05-01',vendor:'한국전력'},
  ],
};

let DB = loadDB();
let currentTab = 'dashboard';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelected = null;
let saveTimer = null;

function loadDB(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r)return JSON.parse(r); }catch(e){}
  return JSON.parse(JSON.stringify(INITIAL));
}
function saveDB(){
  document.getElementById('save-status').textContent='⏳ 저장 중...';
  document.getElementById('save-status').style.color='#f5c842';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(DB)); }catch(e){}
    document.getElementById('save-status').textContent='✓ 자동 저장됨';
    document.getElementById('save-status').style.color='#6fcf97';
  },600);
}
function nextId(arr,prefix){
  return prefix+'-'+String(arr.length+1).padStart(3,'0');
}

// ==================== 헤더 업데이트 ====================
function updateHeader(){
  const rev=DB.payments.filter(p=>p.status==='완료').reduce((s,p)=>s+p.amount,0);
  const exp=DB.expenses.reduce((s,e)=>s+e.amount,0);
  const unp=DB.orders.filter(o=>!o.paid).length;
  document.getElementById('hdr-revenue').textContent='₩'+rev.toLocaleString();
  document.getElementById('hdr-expense').textContent='₩'+exp.toLocaleString();
  document.getElementById('hdr-unpaid').textContent=unp+'건';
}

// ==================== 탭 전환 ====================
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','orders','calendar','customers','payments','expenses'][i]===tab);
  });
  updateHeader();
  const el=document.getElementById('main-content');
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='fadeIn .4s ease';
  if(tab==='dashboard')renderDashboard();
  else if(tab==='orders')renderOrders();
  else if(tab==='calendar')renderCalendar();
  else if(tab==='customers')renderCustomers();
  else if(tab==='payments')renderPayments();
  else if(tab==='expenses')renderExpenses();
}

// ==================== 음력 근사 ====================
function getLunar(ds){
  const d=new Date(ds);
  const epoch=new Date(1900,0,31).getTime();
  const days=Math.floor((d.getTime()-epoch)/86400000);
  const cycle=29.53059;
  const months=days/cycle;
  const m=Math.floor(months%12)+1;
  const day=Math.floor((months%1)*cycle)+1;
  return {m,d:day};
}

}

function renderCalendar(){
  const DAYS=['일','월','화','수','목','금','토'];
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const byDate={};
  DB.orders.forEach(o=>{if(!byDate[o.pickup])byDate[o.pickup]=[];byDate[o.pickup].push(o);});

  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const holiday=KR_HOLIDAYS[ds]||'';
    const lunar=LUNAR_FEST[ds]||'';
    const orders=byDate[ds]||[];
    const isToday=ds===todayStr;
    const isSun=(firstDay+d-1)%7===0;
    const isSat=(firstDay+d-1)%7===6;
    const isSel=calSelected===ds;
    const lun=getLunar(ds);
    const dateColor=holiday?'#e05555':isSun?'#e05555':isSat?'#1565a8':'#2a1208';
    cells+=`<div class="cal-cell" 
      style="background:${isSel?'#fff3e0':isToday?'#e8f5e9':'#fff'};border:${isToday?'2px solid #2e7d5a':isSel?'2px solid #c8832a':'1px solid #f0e0cc'}"
      onclick="calSelectDate('${ds}')">
      <div class="cal-date" style="color:${dateColor};font-weight:${isToday?700:500}">${d}${isToday?'<span style="font-size:7px;background:#2e7d5a;color:#fff;border-radius:2px;padding:0 2px;margin-left:2px">오늘</span>':''}</div>
      <div class="lunar-date">음 ${lun.m}/${lun.d}</div>
      ${holiday?`<div class="holiday-tag">${holiday}</div>`:''}
      ${lunar&&!holiday?`<div class="lunar-tag">${lunar}</div>`:''}
      ${orders.slice(0,2).map(o=>`<div class="cal-order-dot" style="background:${STATUS_MAP[o.status]?.color||'#888'}22;color:${STATUS_MAP[o.status]?.color||'#888'}">${o.customerName}</div>`).join('')}
      ${orders.length>2?`<div style="font-size:8px;color:#888">+${orders.length-2}건</div>`:''}
    </div>`;
  }

  const selOrders=calSelected?byDate[calSelected]||[]:[];
  document.getElementById('main-content').innerHTML=`
  <div class="sec-head"><h2>📅 주문 캘린더</h2><button class="add-btn" onclick="openAddOrder()">+ 신규 주문</button></div>
  <div class="legend-row">
    <div class="legend-item"><div class="legend-dot" style="background:#e05555"></div>공휴일</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7b1fa2"></div>음력 명절</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565a8"></div>주문 있음</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2e7d5a"></div>오늘</div>
  </div>
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <span class="cal-title">${calYear}년 ${MONTHS[calMonth]}</span>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map((d,i)=>`<div class="cal-day-head" style="color:${i===0?'#e05555':i===6?'#1565a8':'#666'}">${d}</div>`).join('')}
      ${cells}
    </div>
    ${calSelected&&selOrders.length?`
    <div class="cal-detail">
      <div class="card-title">${calSelected} 주문 목록</div>
      ${selOrders.map(o=>`<div class="cal-detail-row">
        ${mono(o.id)}<span>${o.customerName}</span>
        <span>${o.items.map(it=>it.name+'×'+it.qty).join(', ')}</span>
        ${badge(o.status)}<strong style="color:#c8832a">₩${o.total.toLocaleString()}</strong>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}
function calPrev(){if(calMonth===0){calYear--;calMonth=11;}else calMonth--;calSelected=null;renderCalendar();}
function calNext(){if(calMonth===11){calYear++;calMonth=0;}else calMonth++;calSelected=null;renderCalendar();}

      <p><b>합계:</b> ₩${o.total.toLocaleString()}</p>
      <p><b>비고:</b> ${o.note||'없음'}</p>
      <p><b>결제:</b> ${o.paid?'✓ 완료':'미결제'}</p>
    </div>`,'<button class="cancel-btn" onclick="closeModal()">닫기</button>');
}

function openAddCustomer(){
  openModal('신규 고객 등록',`
    <div class="form-col">
      <div><label class="lbl">성명</label><input class="inp" id="f-cname"/></div>
      <div><label class="lbl">전화번호</label><input class="inp" id="f-phone" placeholder="010-0000-0000"/></div>
      <div><label class="lbl">이메일</label><input class="inp" id="f-email" type="email"/></div>
      <div><label class="lbl">주소</label><input class="inp" id="f-addr"/></div>
      <div><label class="lbl">메모</label><input class="inp" id="f-cnote"/></div>
    </div>`,
    '<button class="cancel-btn" onclick="closeModal()">취소</button><button class="submit-btn" onclick="submitCustomer()">저장하기</button>');
}
function submitCustomer(){
  const name=document.getElementById('f-cname').value;
  if(!name){alert('성명을 입력해주세요.');return;}
  DB.customers.push({id:nextId(DB.customers,'C'),name,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,address:document.getElementById('f-addr').value,note:document.getElementById('f-cnote').value,totalOrders:0,totalSpent:0});
  saveDB();closeModal();renderCustomers();
}

function openEditCustomer(id){
  const c=DB.customers.find(x=>x.id===id);
  if(!c)return;
  openModal('고객 정보 수정',`
    <div class="form-col">
      <div><label class="lbl">성명</label><input class="inp" id="f-cname" value="${c.name}"/></div>
      <div><label class="lbl">전화번호</label><input class="inp" id="f-phone" value="${c.phone}"/></div>
      <div><label class="lbl">이메일</label><input class="inp" id="f-email" value="${c.email}"/></div>
      <div><label class="lbl">주소</label><input class="inp" id="f-addr" value="${c.address}"/></div>
      <div><label class="lbl">메모</label><input class="inp" id="f-cnote" value="${c.note}"/></div>
    </div>`,
    `<button class="cancel-btn" onclick="closeModal()">취소</button><button class="submit-btn" onclick="submitEditCustomer('${id}')">저장하기</button>`);
}
function submitEditCustomer(id){
  DB.customers=DB.customers.map(c=>c.id===id?{...c,name:document.getElementById('f-cname').value,phone:document.getElementById('f-phone').value,email:document.getElementById('f-email').value,address:document.getElementById('f-addr').value,note:document.getElementById('f-cnote').value}:c);
  saveDB();closeModal();renderCustomers();
}

function openAddPayment(orderId='',amount=''){
  openModal('결제 입력',`
    <div class="form-col">
      <div><label class="lbl">주문번호</label><input class="inp" id="f-oid" value="${orderId}"/></div>
      <div><label class="lbl">금액 (₩)</label><input class="inp" id="f-amt" type="number" value="${amount}"/></div>
      <div><label class="lbl">결제 수단</label><select class="inp sel" id="f-method">${METHODS.map(m=>`<option>${m}</option>`).join('')}</select></div>
      <div><label class="lbl">날짜</label><input class="inp" id="f-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    </div>`,
    '<button class="cancel-btn" onclick="closeModal()">취소</button><button class="submit-btn" onclick="submitPayment()">저장하기</button>');
}
function openAddPaymentFor(id,amt){openAddPayment(id,amt);}
function submitPayment(){
  const oid=document.getElementById('f-oid').value;
  const amt=Number(document.getElementById('f-amt').value);
  if(!oid||!amt){alert('주문번호와 금액을 입력해주세요.');return;}
  DB.payments.push({id:nextId(DB.payments,'PAY'),orderId:oid,amount:amt,method:document.getElementById('f-method').value,date:document.getElementById('f-date').value,status:'완료'});
  DB.orders=DB.orders.map(o=>o.id===oid?{...o,paid:true}:o);
  saveDB();closeModal();renderPayments();updateHeader();
}

function openAddExpense(){
  openModal('경비 추가',`
    <div class="form-col">
      <div><label class="lbl">카테고리</label><select class="inp sel" id="f-cat">${EXPENSE_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label class="lbl">품목명</label><input class="inp" id="f-item"/></div>
      <div><label class="lbl">금액 (₩)</label><input class="inp" id="f-eamt" type="number"/></div>
      <div><label class="lbl">납품업체</label><input class="inp" id="f-vendor"/></div>
      <div><label class="lbl">날짜</label><input class="inp" id="f-edate" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    </div>`,
    '<button class="cancel-btn" onclick="closeModal()">취소</button><button class="submit-btn" onclick="submitExpense()">저장하기</button>');
}
function submitExpense(){
  const item=document.getElementById('f-item').value;
  const amt=Number(document.getElementById('f-eamt').value);
  if(!item||!amt){alert('품목명과 금액을 입력해주세요.');return;}
  DB.expenses.push({id:nextId(DB.expenses,'EXP'),category:document.getElementById('f-cat').value,item,amount:amt,vendor:document.getElementById('f-vendor').value,date:document.getElementById('f-edate').value});
  saveDB();closeModal();renderExpenses();updateHeader();
}

// ==================== 초기화 ====================
updateHeader();
renderDashboard();
</script>
</body>
</html>
